version: "3"

vars:
  ARK: ../../cli/bin/ark

includes:
  wiki:
    taskfile: .wiki/Taskfile.yml
    dir: .wiki
  tickets:
    taskfile: .tickets/Taskfile.yml
    dir: .tickets

tasks:
  check:conventions:
    desc: Validate the tracked convention contract for demo-repo
    cmds:
      - "{{.ARK}} check --repo-root . --config .convention-engineering.json"

  verify:
    desc: Run the demo repo verification gates
    cmds:
      - task: tickets:test
      - task: wiki:lint
      - task: check:conventions
