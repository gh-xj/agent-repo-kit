version: 2

project_name: ark

before:
  hooks:
    - cd cli && go mod tidy

builds:
  - id: ark
    binary: ark
    dir: cli
    gomod:
      dir: cli
    main: ./cmd/ark
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gh-xj/agent-repo-kit/cli/internal/arkcli.appVersion={{.Version}}
      - -X github.com/gh-xj/agent-repo-kit/cli/internal/arkcli.appCommit={{.Commit}}
      - -X github.com/gh-xj/agent-repo-kit/cli/internal/arkcli.appDate={{.Date}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
  - id: work
    binary: work
    dir: cli
    gomod:
      dir: cli
    main: ./cmd/work
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gh-xj/agent-repo-kit/cli/internal/workcli.appVersion={{.Version}}
      - -X github.com/gh-xj/agent-repo-kit/cli/internal/workcli.appCommit={{.Commit}}
      - -X github.com/gh-xj/agent-repo-kit/cli/internal/workcli.appDate={{.Date}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: ark
    builds: [ark, work]
    name_template: "ark-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format: tar.gz
    files:
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
