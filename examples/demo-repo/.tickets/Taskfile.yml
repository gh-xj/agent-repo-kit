version: "3"

# Flat-file ticket tracker. Run from repo root: `task -d .tickets <cmd>`.
# Schema lives in harness/schema.yaml. Taxonomy lives in harness/taxonomy.yaml.
#
# Layout:
#   .tickets/
#     all/T-NN-slug/ticket.md       canonical ticket bodies
#     audit-log.md                  append-only transition log
#     harness/                      schema + taxonomy + tests
#
# State lives in frontmatter (`status:`), not the filesystem.

vars:
  ALL_DIR: all
  AUDIT_LOG: audit-log.md
  LOCK_DIR: .lock
  SCHEMA: harness/schema.yaml
  TAXONOMY: harness/taxonomy.yaml

tasks:
  default:
    desc: Show ticket workspace status
    cmds:
      - task: list

  init:
    desc: Idempotent scaffold of directories and log files
    cmds:
      - mkdir -p {{.ALL_DIR}} harness
      - test -f {{.AUDIT_LOG}} || printf '# Audit Log\n\n' > {{.AUDIT_LOG}}

  list:
    desc: Show non-terminal tickets grouped by status
    silent: true
    cmds:
      - |
        if ! ls {{.ALL_DIR}}/*/ticket.md >/dev/null 2>&1; then
          echo "(no tickets yet — use: task -d .tickets new -- \"title\" --priority P1 --category bug)"
          exit 0
        fi
        printf '%-8s %-12s %-4s %-14s %s\n' ID STATUS PRI CATEGORY TITLE
        printf '%-8s %-12s %-4s %-14s %s\n' ----- ------ --- -------- -----
        for f in {{.ALL_DIR}}/*/ticket.md; do
          id=$(awk -F': *' '/^id:/{print $2; exit}' "$f")
          status=$(awk -F': *' '/^status:/{print $2; exit}' "$f")
          pri=$(awk -F': *' '/^priority:/{print $2; exit}' "$f")
          cat=$(awk -F': *' '/^category:/{print $2; exit}' "$f")
          title=$(awk '/^title:/{sub(/^title: */,""); gsub(/^"|"$/,""); gsub(/\\"/,"\""); print; exit}' "$f")
          case "$status" in DONE|CANCELLED) continue;; esac
          printf '%-8s %-12s %-4s %-14s %s\n' "$id" "$status" "$pri" "$cat" "$title"
        done

  new:
    desc: 'Create ticket. Usage: task new -- "title" --priority P1 --category bug [--estimated 2h]'
    aliases: [create]
    silent: true
    cmds:
      - |
        title=""; pri=""; cat=""; est="1h"
        set -- {{.CLI_ARGS}}
        while [ $# -gt 0 ]; do
          case "$1" in
            --priority)
              case "${2-}" in ""|--*) echo "missing value for --priority" >&2; exit 2;; esac
              pri="$2"; shift 2 ;;
            --category)
              case "${2-}" in ""|--*) echo "missing value for --category" >&2; exit 2;; esac
              cat="$2"; shift 2 ;;
            --estimated)
              case "${2-}" in ""|--*) echo "missing value for --estimated" >&2; exit 2;; esac
              est="$2"; shift 2 ;;
            --title)
              case "${2-}" in "") echo "missing value for --title" >&2; exit 2;; esac
              title="$2"; shift 2 ;;
            --*) echo "unknown flag: $1" >&2; exit 2 ;;
            *) title="$1"; shift ;;
          esac
        done
        if [ -z "$title" ] || [ -z "$pri" ] || [ -z "$cat" ]; then
          echo 'usage: task -d .tickets new -- "title" --priority P0..P3 --category <taxonomy> [--estimated 2h]' >&2
          exit 2
        fi
        # Validate priority against schema
        allowed_priorities=$(awk '
          $1=="priority:" {in_priority=1; next}
          in_priority && $1=="allowed:" {in_allowed=1; next}
          in_allowed && $1=="-" {print $2; next}
          in_allowed && $1!="-" {exit}
        ' {{.SCHEMA}})
        if ! printf '%s\n' "$allowed_priorities" | grep -Fx "$pri" >/dev/null; then
          echo "invalid priority: $pri" >&2
          echo "allowed: $(printf '%s\n' "$allowed_priorities" | paste -sd ', ' -)" >&2
          exit 2
        fi
        # Validate category against taxonomy
        allowed_categories=$(awk '
          $1=="categories:" {in_categories=1; next}
          in_categories && /^[^[:space:]]/ {exit}
          in_categories && $1 ~ /:$/ {sub(/:$/, "", $1); print $1}
        ' {{.TAXONOMY}})
        if ! printf '%s\n' "$allowed_categories" | grep -Fx "$cat" >/dev/null; then
          echo "invalid category: $cat" >&2
          echo "allowed: $(printf '%s\n' "$allowed_categories" | paste -sd ', ' -)" >&2
          exit 2
        fi
        mkdir -p {{.ALL_DIR}}
        # Acquire ID allocation lock
        tries=0
        while ! mkdir {{.LOCK_DIR}} 2>/dev/null; do
          tries=$((tries + 1))
          if [ $tries -gt 50 ]; then
            echo "lock timeout: remove stale {{.LOCK_DIR}} if needed" >&2
            exit 1
          fi
          sleep 0.1
        done
        trap 'rmdir {{.LOCK_DIR}} 2>/dev/null || true' EXIT
        # Allocate next ID. Strip leading zeros so POSIX $(( )) doesn't treat as octal.
        next=$(ls -1 {{.ALL_DIR}} 2>/dev/null | sed -nE 's#^T-0*([0-9]+)-.*#\1#p' | sort -n | tail -1)
        id=$(printf 'T-%02d' "$((${next:-0} + 1))")
        slug=$(printf '%s' "$title" | tr '[:upper:]' '[:lower:]' | tr '\n\r' '  ' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' | cut -c1-48)
        dir="{{.ALL_DIR}}/$id-$slug"
        mkdir -p "$dir"
        f="$dir/ticket.md"
        # YAML-escape title: replace newlines, escape backslashes and double quotes.
        safe_title=$(printf '%s' "$title" | tr '\n\r' '  ' | sed -e 's/\\/\\\\/g' -e 's/"/\\"/g')
        today=$(date +%Y-%m-%d)
        {
          echo '---'
          echo "id: $id"
          echo "title: \"$safe_title\""
          echo "status: OPEN"
          echo "priority: $pri"
          echo "category: $cat"
          echo "created: $today"
          echo "estimated: $est"
          echo '---'
          echo
          echo "# $id — $safe_title"
          echo
          echo '## Summary'
          echo
          echo '## Action Items'
          echo '- [ ] '
          echo
          echo '## Lifecycle Log'
          echo "- $today OPEN — created"
        } > "$f"
        printf '%s  %s  created\n' "$(date +%Y-%m-%d)" "$id" >> {{.AUDIT_LOG}}
        echo "created $f"

  transition:
    desc: 'Transition. Usage: task transition -- T-04 --to DONE [--note "reason"]'
    silent: true
    cmds:
      - |
        set_fm_field() {
          file=$1; key=$2; value=$3
          awk -v key="$key" -v value="$value" '
            BEGIN { in_fm=0; done=0 }
            NR==1 && $0=="---" { in_fm=1; print; next }
            in_fm && $0=="---" {
              if (!done) print key ": " value
              in_fm=0
              print
              next
            }
            in_fm && index($0, key ":") == 1 {
              if (!done) { print key ": " value; done=1 }
              next
            }
            { print }
          ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
        }
        rm_fm_field() {
          file=$1; key=$2
          awk -v key="$key" '
            BEGIN { in_fm=0 }
            NR==1 && $0=="---" { in_fm=1; print; next }
            in_fm && $0=="---" { in_fm=0; print; next }
            in_fm && index($0, key ":") == 1 { next }
            { print }
          ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
        }
        id=""; to=""; note=""
        set -- {{.CLI_ARGS}}
        while [ $# -gt 0 ]; do
          case "$1" in
            --to)
              case "${2-}" in ""|--*) echo "missing value for --to" >&2; exit 2;; esac
              to=$(printf '%s' "$2" | tr '[:lower:]' '[:upper:]'); shift 2 ;;
            --note)
              case "${2-}" in "") echo "missing value for --note" >&2; exit 2;; esac
              note="$2"; shift 2 ;;
            --*) echo "unknown flag: $1" >&2; exit 2 ;;
            *) id="$1"; shift ;;
          esac
        done
        if [ -z "$id" ] || [ -z "$to" ]; then
          echo 'usage: task -d .tickets transition -- T-04 --to DONE [--note "..."]' >&2
          exit 2
        fi
        # Sanitize note: strip control chars (incl. \n, \r) to prevent audit-log forgery
        note=$(printf '%s' "$note" | tr -d '[:cntrl:]')
        case "$to" in RESOLVED) to=DONE ;; esac
        # Acquire lock: read-validate-write-append must be atomic vs concurrent callers
        tries=0
        while ! mkdir {{.LOCK_DIR}} 2>/dev/null; do
          tries=$((tries + 1))
          if [ $tries -gt 50 ]; then
            echo "lock timeout: remove stale {{.LOCK_DIR}} if needed" >&2
            exit 1
          fi
          sleep 0.1
        done
        trap 'rmdir {{.LOCK_DIR}} 2>/dev/null || true' EXIT
        # Match exactly one ticket dir by ID
        match_count=$(ls -1d {{.ALL_DIR}}/$id-*/ 2>/dev/null | wc -l | tr -d ' ')
        if [ "$match_count" -eq 0 ]; then
          echo "no ticket matching $id" >&2
          exit 1
        fi
        if [ "$match_count" -gt 1 ]; then
          echo "multiple tickets matching $id (filesystem inconsistency):" >&2
          ls -1d {{.ALL_DIR}}/$id-*/ >&2
          exit 1
        fi
        f=$(ls -1d {{.ALL_DIR}}/$id-*/ | head -1)ticket.md
        from=$(awk -F': *' '/^status:/{print $2; exit}' "$f")
        valid_states=$(awk '
          $1=="states:" {in_states=1; next}
          in_states && /^[^[:space:]]/ {exit}
          in_states && $1=="-" {print $2}
        ' {{.SCHEMA}})
        if ! printf '%s\n' "$valid_states" | grep -Fx "$to" >/dev/null; then
          echo "invalid target state: $to" >&2
          echo "valid states: $(printf '%s\n' "$valid_states" | paste -sd ', ' -)" >&2
          exit 2
        fi
        allowed=$(awk -v state="$from" '
          $1=="transitions:" {in_t=1; next}
          in_t && /^[^[:space:]]/ {exit}
          in_t {
            key=$1
            sub(/:$/, "", key)
            if (key==state) {
              line=$0
              sub(/^[^[]*\[/, "", line)
              sub(/\].*$/, "", line)
              count=split(line, items, ",")
              for (i=1; i<=count; i++) {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", items[i])
                print items[i]
              }
              exit
            }
          }
        ' {{.SCHEMA}})
        if ! printf '%s\n' "$allowed" | grep -Fx "$to" >/dev/null; then
          echo "invalid transition: $from -> $to" >&2
          echo "allowed from $from: $(printf '%s\n' "$allowed" | paste -sd ', ' -)" >&2
          exit 2
        fi
        date=$(date +%Y-%m-%d)
        set_fm_field "$f" status "$to"
        if [ "$to" = "DONE" ]; then
          set_fm_field "$f" resolved "$date"
          rm_fm_field "$f" cancel_reason
        fi
        if [ "$to" = "CANCELLED" ]; then
          rm_fm_field "$f" resolved
          # YAML-escape note
          safe_note=$(printf '%s' "${note:-cancelled}" | tr '\n\r' '  ' | sed -e 's/\\/\\\\/g' -e 's/"/\\"/g')
          set_fm_field "$f" cancel_reason "\"$safe_note\""
        fi
        printf '\n- %s %s — %s' "$date" "$to" "${note:-transition from $from}" >> "$f"
        printf '%s  %s  %s -> %s%s\n' "$date" "$id" "$from" "$to" "${note:+ ($note)}" >> {{.AUDIT_LOG}}
        echo "$id: $from -> $to"

  close:
    desc: 'Cancel tickets. Usage: task close -- T-06 T-08 --reason "superseded"'
    silent: true
    cmds:
      - |
        ids=""; reason="cancelled"
        set -- {{.CLI_ARGS}}
        while [ $# -gt 0 ]; do
          case "$1" in
            --reason)
              case "${2-}" in "") echo "missing value for --reason" >&2; exit 2;; esac
              reason="$2"; shift 2 ;;
            --*) echo "unknown flag: $1" >&2; exit 2 ;;
            *) ids="$ids $1"; shift ;;
          esac
        done
        if [ -z "$ids" ]; then
          echo 'usage: task -d .tickets close -- T-06 [T-08 ...] --reason "..."' >&2
          exit 2
        fi
        # Sanitize reason: strip control chars (incl. \n, \r) to prevent audit-log forgery
        reason=$(printf '%s' "$reason" | tr -d '[:cntrl:]')
        for id in $ids; do
          task -d . transition -- "$id" --to CANCELLED --note "$reason"
        done

  test:
    desc: Run the ticket-system test harness
    cmds:
      - bash harness/test-ticket-system.sh
