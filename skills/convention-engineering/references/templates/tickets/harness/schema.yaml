---
# Ticket frontmatter schema and state-transition rules.
# Project-specific terms live in taxonomy.yaml.

templates:
  default:
    storage: all/
    naming: '^T-\d{2,}-[a-z0-9-]+$'
    required:
      - id # T-NN, monotonic per repo
      - title
      - status
      - priority # P0 | P1 | P2 | P3
      - category # value drawn from taxonomy.yaml categories
      - created # YYYY-MM-DD
      - estimated # human duration string, e.g. "30m", "2h"
    optional:
      - owner
      - phase
      - blockers
      - related
      - actual
      - resolved
      - cancel_reason

fields:
  priority:
    allowed:
      - P0
      - P1
      - P2
      - P3
  category:
    source: taxonomy.categories

terminal_metadata:
  DONE:
    date_field: resolved
    clears:
      - cancel_reason
  CANCELLED:
    reason_field: cancel_reason
    recorded_in:
      - lifecycle_log
      - audit_log
    clears:
      - resolved

states:
  - OPEN
  - IN_PROGRESS
  - BLOCKED
  - REVIEW
  - DONE
  - CANCELLED

transitions:
  OPEN: [IN_PROGRESS, BLOCKED, CANCELLED]
  IN_PROGRESS: [BLOCKED, REVIEW, DONE, CANCELLED]
  BLOCKED: [IN_PROGRESS, CANCELLED]
  REVIEW: [IN_PROGRESS, DONE, CANCELLED]
  DONE: []
  CANCELLED: []
