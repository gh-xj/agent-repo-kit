---
# Project-specific ticket taxonomy for demo-repo.

project: demo-repo

categories:
  bug: Functional defect or regression in the example scaffolding
  docs: Documentation, onboarding text, and reference material
  automation: Taskfiles, helper scripts, and verification automation
  contract: Convention contract, agent-doc, or pointer-block changes
  tickets: Ticket workflow, schema, taxonomy, and audit trail changes
  wiki: Wiki rules, linting, and source-page workflow changes
  examples: Demo repo scaffolding and adoption example maintenance
  refactor: Behavior-preserving structural change
  research: Investigation, diagnosis, or spike work
  chore: Routine maintenance with no intended behavior change

phases:
  triage: Investigation in progress; cause not yet localized
  design: Planning or specification stage
  build: Implementation underway
  verify: Validation underway
  rollout: Awaiting adoption, merge, or migration
  followup: Post-resolution monitoring or cleanup

terms:
  AGENTS.md: Workspace operating contract
  CLAUDE.md: Mirror of AGENTS.md for alternate harness discovery
  Taskfile: go-task task runner entrypoint
  agent-repo-kit: Harness-agnostic convention kit that owns this example
  demo-repo: Example downstream-style repo bundled with agent-repo-kit
