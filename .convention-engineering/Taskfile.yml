version: "3"

tasks:
  work:check:
    desc: Validate the repo work tracker store
    cmds:
      - go run -C ../cli ./cmd/work --store ../.work init >/dev/null
      - go run -C ../cli ./cmd/work --store ../.work view ready --json >/dev/null

  check:conventions:
    desc: Validate the tracked convention contract
    cmds:
      - bash check.sh --repo-root .. --config .convention-engineering.json

  verify:
    desc: Run the repo convention verification gates
    cmds:
      - task: work:check
      - task: check:conventions

