name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install go-task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
          task --version

      - name: tickets — state-machine tests (expect 10/10)
        working-directory: examples/demo-repo/.tickets
        run: task test

      - name: wiki — lint (expect OK)
        working-directory: examples/demo-repo/.wiki
        run: task lint

  ark-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Install go-task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
          task --version

      - name: cli — task ci (lint + test + build + smoke)
        working-directory: cli
        run: task ci

      - name: skill-sync — verify adapters in sync
        run: ./cli/bin/ark skill check --manifest .agent-repo-kit.json --repo-root .

      - name: taskfile-lint — structural lint on all repo Taskfiles
        run: |
          set -e
          ./cli/bin/ark taskfile lint --repo-root . --path cli/Taskfile.yml
          ./cli/bin/ark taskfile lint --repo-root . --path examples/demo-repo/Taskfile.yml
          ./cli/bin/ark taskfile lint --repo-root . --path examples/demo-repo/.tickets/Taskfile.yml
          ./cli/bin/ark taskfile lint --repo-root . --path examples/demo-repo/.wiki/Taskfile.yml
