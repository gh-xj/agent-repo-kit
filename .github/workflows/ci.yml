name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: sudo apt-get update -y && sudo apt-get install -y yq

      - name: Install work CLI
        run: go install github.com/gh-xj/work-cli/cmd/work@v0.1.0

      - name: task verify
        run: task verify
