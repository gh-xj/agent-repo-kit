name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install go-task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
          task --version

      - name: tickets — state-machine tests (expect 10/10)
        working-directory: examples/demo-repo/.tickets
        run: task test

      - name: wiki — lint (expect OK)
        working-directory: examples/demo-repo/.wiki
        run: task lint

  ark-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Install go-task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
          task --version

      - name: cli — task ci (lint + test + build + smoke)
        working-directory: cli
        run: task ci

      - name: skill-sync — verify adapters in sync
        run: ./cli/bin/ark skill check --repo-root .

      - name: taskfile-lint — structural lint on every Taskfile in the repo
        run: |
          set -e
          # Discover all Taskfile*.yml under the repo (excluding .git and vendor)
          # so a new Taskfile added tomorrow is linted automatically. A failure
          # on any one file fails the step.
          mapfile -t TASKFILES < <(find . -type f \
            \( -name 'Taskfile.yml' -o -name 'Taskfile.*.yml' \) \
            -not -path './.git/*' \
            -not -path './.claude/*' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            | sort)
          if [ ${#TASKFILES[@]} -eq 0 ]; then
            echo "no Taskfiles discovered" >&2
            exit 1
          fi
          echo "linting ${#TASKFILES[@]} Taskfile(s):"
          printf '  %s\n' "${TASKFILES[@]}"
          for tf in "${TASKFILES[@]}"; do
            ./cli/bin/ark taskfile lint --repo-root . --path "$tf"
          done
