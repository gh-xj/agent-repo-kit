version: "3"

tasks:
  verify:
    desc: Run the repo's canonical verification gate
    cmds:
      - task -d cli ci

  work:
    desc: Run the repo-local work CLI
    cmds:
      - go run -C cli ./cmd/work --store ../.work {{.CLI_ARGS}}

  work:qa:
    desc: Run black-box QA against the source work CLI
    cmds:
      - go run ./.codex/skills/work-cli-qa/cli/main.go --repo-root . {{.CLI_ARGS}}

  skills:link-dev:
    desc: Symlink the shipped repo skills into ~/.agents/skills and ~/.claude/skills for local maintenance
    preconditions:
      - sh: test -x "{{.TASKFILE_DIR}}/scripts/link-dev-skills.sh"
        msg: "scripts/link-dev-skills.sh is missing or not executable"
    cmds:
      - "{{.TASKFILE_DIR}}/scripts/link-dev-skills.sh"
