---
# Project-specific ticket taxonomy for private-config.

project: private-config

categories:
  bug: Functional defect or regression
  config: App, shell, editor, or OS configuration work
  automation: Scripts, Taskfiles, CLIs, and workflow automation
  docs: Documentation, instructions, and reference material
  infra: Local services, containers, CI, and environment plumbing
  plugin: Codex/Claude plugins, skills, prompts, and agent tooling
  data: Knowledge files, templates, indexes, and generated artifacts
  refactor: Behavior-preserving structural change
  research: Investigation, diagnosis, or spike work
  chore: Routine maintenance with no intended behavior change

phases:
  triage: Investigation in progress; cause not yet localized
  design: Planning or specification stage
  build: Implementation underway
  verify: Validation underway
  rollout: Awaiting adoption, merge, or migration
  followup: Post-resolution monitoring or cleanup

terms:
  AGENTS.md: Workspace operating contract
  OMX: oh-my-codex orchestration layer
  Taskfile: go-task task runner entrypoint
  private-config: Personal configuration monorepo
