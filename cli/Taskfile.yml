version: "3"

tasks:
  deps:
    desc: Sync module dependencies
    cmds:
      - go mod tidy

  fmt:
    desc: Format Go files
    cmds:
      - gofmt -w .

  fmt:check:
    desc: Fail when gofmt would change files
    cmds:
      - test -z "$(gofmt -l .)"

  lint:
    desc: Run static checks
    deps: [deps, fmt:check]
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    deps: [deps, fmt:check]
    cmds:
      - go test ./...

  build:
    desc: Build ark and work binaries
    deps: [deps, fmt:check]
    cmds:
      - mkdir -p bin
      - go build -o bin/ark ./cmd/ark
      - go build -o bin/work ./cmd/work

  run:
    desc: Run ark without building
    cmds:
      - go run ./cmd/ark {{.CLI_ARGS}}

  run:work:
    desc: Run work without building
    cmds:
      - go run ./cmd/work {{.CLI_ARGS}}

  smoke:
    desc: Deterministic smoke checks
    deps: [build]
    cmds:
      - mkdir -p test/smoke
      - rm -f test/smoke/version.output.json test/smoke/work-version.output.json
      - ./bin/ark --json version > test/smoke/version.output.json
      - go run ./internal/tools/smokecheck --schema test/smoke/version.schema.json --input test/smoke/version.output.json
      - ./bin/work --json version > test/smoke/work-version.output.json
      - go run ./internal/tools/smokecheck --schema test/smoke/version.schema.json --input test/smoke/work-version.output.json
      - |
        WORK_SMOKE=$(mktemp -d)
        ./bin/work --store "$WORK_SMOKE/.work" init
        ./bin/work --store "$WORK_SMOKE/.work" inbox add "Captured idea" --body "raw note" --source smoke
        ./bin/work --store "$WORK_SMOKE/.work" inbox --json >/dev/null
        ./bin/work --store "$WORK_SMOKE/.work" triage accept IN-0001 --priority P1 --area smoke
        ./bin/work --store "$WORK_SMOKE/.work" view ready --json >/dev/null
        ./bin/work --store "$WORK_SMOKE/.work" show W-0001 --json >/dev/null
        ./bin/work --store "$WORK_SMOKE/.work" show IN-0001 --json >/dev/null

  ci:
    desc: Canonical CI contract command
    deps: [lint, test, build, smoke]
    cmds:
      - echo "ci checks passed"

  verify:
    desc: Local aggregate verification
    deps: [ci]
    cmds:
      - echo "verify checks passed"
